<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FY26-27 EMEA Sales, Delivery & Tentative Projection Dashboard</title>
<style>
  :root{
    --bg:#f4f7fb; --card:#fff; --text:#000000; --muted:#000000; --line:#e5e7eb;
    --brand:#1f4e79; --brand2:#2e75b6; --good:#0f8a4b; --warn:#b7791f; --bad:#c62828; --softbad:#fff1f1;
    --softgood:#ecfdf3; --softbrand:#eaf3ff; --shadow:0 10px 24px rgba(16,24,40,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
  header{background:#ffffff;color:#000000;padding:22px 28px;position:sticky;top:0;z-index:10;box-shadow:var(--shadow)}
  header h1{margin:0;font-size:24px} header p{margin:6px 0 0;opacity:.9;font-size:13px}
  main{padding:20px;max-width:1600px;margin:auto}
  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px}.tab{border:1px solid var(--brand2);background:var(--brand2);color:#ffffff;padding:10px 14px;border-radius:999px;cursor:pointer;font-weight:700;box-shadow:0 2px 6px rgba(31,78,121,.18)}.tab:hover{background:var(--brand);border-color:var(--brand)}.tab.active{background:#123b5d;color:#ffffff;border-color:#123b5d;box-shadow:0 3px 10px rgba(31,78,121,.28)}
  .grid{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(220px,1fr));gap:14px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(280px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:16px}.card h2,.card h3{margin:0 0 12px}.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}.kpi .label{font-size:12px;color:var(--muted);font-weight:700}.kpi .value{font-size:23px;font-weight:800;margin-top:6px}.kpi .sub{font-size:12px;color:var(--muted);margin-top:3px}.good{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}
  table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:13px;vertical-align:middle}th{background:#f8fafc;color:#000000;font-size:12px;text-transform:uppercase}.num{text-align:right}.flag{background:var(--softbad);color:var(--bad);font-weight:800;border-radius:999px;padding:4px 8px;font-size:12px;display:inline-block;margin:1px 0}.ok{background:var(--softgood);color:var(--good);font-weight:800;border-radius:999px;padding:4px 8px;font-size:12px;display:inline-block;margin:1px 0}.pill{background:var(--softbrand);color:var(--brand);font-weight:800;border-radius:999px;padding:4px 8px;font-size:12px;display:inline-block;margin:1px 0}
  input,select,textarea{width:100%;border:1px solid #cfd6e4;border-radius:10px;padding:8px;font-size:13px;background:#fff}textarea{min-height:54px}.form-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:10px}.form-row.small{grid-template-columns:repeat(4,1fr)}label{font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:4px}
  button{border:0;background:var(--brand);color:#ffffff;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer}button:hover{filter:brightness(.95)}button.secondary{background:#fff;color:#000000;border:1px solid var(--brand)}button.danger{background:var(--bad)}button:disabled{opacity:.5;cursor:not-allowed}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.hidden{display:none}.note{font-size:13px;color:var(--muted)}.section-title{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.progress{height:10px;background:#eef2f7;border-radius:999px;overflow:hidden;margin-top:4px}.bar{height:100%;background:var(--brand);width:0}.bar.goodbar{background:var(--good)}.bar.badbar{background:var(--bad)}.smalltext{font-size:12px;color:var(--muted)}

  .chart-grid{display:grid;grid-template-columns:repeat(2,minmax(320px,1fr));gap:16px}
  .chart-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px;page-break-inside:avoid}
  .chart-card h3{margin:0 0 4px;font-size:18px}.chart-card .desc{font-size:12px;color:#000;margin-bottom:14px}
  .chart-row{display:grid;grid-template-columns:150px 1fr 95px;gap:10px;align-items:center;margin:9px 0}
  .chart-label{font-size:12px;font-weight:700;color:#000}.chart-value{text-align:right;font-size:12px;font-weight:800;color:#000}
  .chart-track{height:20px;background:#eef2f7;border-radius:999px;overflow:hidden;position:relative}.chart-fill{height:100%;background:#2e75b6;border-radius:999px}.chart-fill.delivery{background:#0f8a4b}.chart-fill.warnfill{background:#b7791f}.chart-fill.badfill{background:#c62828}
  .chart-mini{display:flex;gap:6px;align-items:end;height:150px;padding:12px 4px 0;border-bottom:1px solid #d9e2ef}.chart-col{flex:1;display:flex;gap:4px;align-items:end;justify-content:center}.chart-bar{width:28px;min-height:2px;background:#2e75b6;border-radius:8px 8px 0 0}.chart-bar.delivery{background:#0f8a4b}.chart-bar.target{background:#b7791f}.chart-axis{display:flex;gap:6px;font-size:11px;font-weight:700;text-align:center;margin-top:6px}.chart-axis span{flex:1}.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;font-weight:700;margin-top:10px}.legend i{width:12px;height:12px;display:inline-block;border-radius:3px;margin-right:4px;vertical-align:-1px}.legend .sales{background:#2e75b6}.legend .delivery{background:#0f8a4b}.legend .target{background:#b7791f}
  .presentation-title{background:#123b5d;color:#fff;border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}.presentation-title h2{margin:0;color:#fff}.presentation-title p{margin:6px 0 0;color:#fff}
  .chart-data{margin-top:12px;font-size:12px}.chart-data th,.chart-data td{font-size:12px;padding:6px}.chart-data th{background:#eef4fb}.accuracy-box{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0;font-size:13px}
  #syncStatus{background:#eef4fb;border:1px solid #c9d9ec;border-radius:14px;padding:10px 12px;margin:0 0 14px;font-size:13px;font-weight:700;color:#000}
  @media print{header,.tabs,.actions button:not(.printKeep){display:none!important}main{max-width:none;padding:0}.view.hidden{display:none!important}.card,.chart-card{box-shadow:none}.chart-grid{grid-template-columns:1fr 1fr}body{background:#fff}}
  @media(max-width:1000px){.grid,.grid3,.grid2,.form-row,.form-row.small{grid-template-columns:1fr}header{position:static}}
</style>
</head>
<body>
<header>
  <h1>FY26-27 EMEA Sales, Delivery & Tentative Projection Dashboard</h1>
  <p>FY starts 1 July 2026 and ends 30 June 2027. Team members update every Tuesday for the current month and next two months.</p>
</header>
<main>
  <div class="tabs">
    <button class="tab active" data-view="entry">Weekly Entry</button>
    <button class="tab" data-view="quotes">Quotation Tracker</button>
    <button class="tab" data-view="weeklyRegion">Weekly Regional Update</button>
    <button class="tab" data-view="charts">Presentation Charts</button>
    <button class="tab" data-view="manager">EMEA Dashboard</button>
    <button class="tab" data-view="regions">Region Dashboards</button>
    <button class="tab" data-view="qytd">Quarterly / Half-Year / YTD / Annual Dashboard</button>
    <button class="tab" data-view="individual">Individual Dashboard</button>
    <button class="tab" data-view="settings">Backup / Reset</button>
  </div>
  <div id="syncStatus">Online sync not configured yet. Paste the Google Apps Script Web App URL inside the HTML file.</div>

  <section id="entry" class="view"></section>
  <section id="manager" class="view hidden"></section>
  <section id="regions" class="view hidden"></section>
  <section id="qytd" class="view hidden"></section>
  <section id="individual" class="view hidden"></section>
  <section id="quotes" class="view hidden"></section>
  <section id="weeklyRegion" class="view hidden"></section>
  <section id="charts" class="view hidden"></section>
  <section id="settings" class="view hidden"></section>
</main>
<script>
const FY_START = new Date(2026,6,1); // 1 July 2026
const FY_END = new Date(2027,5,30);
const CURRENCY = 'AUD';
const TEAM = [
 {region:'Middle East', name:'Fauzan Ahmad', yearly:815399, q:[227496,203850,178572,205481]},
 {region:'Middle East', name:'Kiran M', yearly:815399, q:[227496,203850,178572,205481]},
 {region:'Africa', name:'Ajith KA', yearly:616224, q:[171927,134952,155289,154056]},
 {region:'Europe', name:'Parthiban P', yearly:413602, q:[90579,97886,109742,115395]},
 {region:'Europe', name:'Aijaz Yousuf', yearly:258504, q:[56613,61179,68589,72123]},
 {region:'Europe', name:'TBH', yearly:361901, q:[79257,85649,96024,100971]}
];
const MONTHS = [
 {key:'2026-07', label:'July 2026', short:'Jul', q:0, half:1}, {key:'2026-08', label:'August 2026', short:'Aug', q:0, half:1}, {key:'2026-09', label:'September 2026', short:'Sep', q:0, half:1},
 {key:'2026-10', label:'October 2026', short:'Oct', q:1, half:1}, {key:'2026-11', label:'November 2026', short:'Nov', q:1, half:1}, {key:'2026-12', label:'December 2026', short:'Dec', q:1, half:1},
 {key:'2027-01', label:'January 2027', short:'Jan', q:2, half:2}, {key:'2027-02', label:'February 2027', short:'Feb', q:2, half:2}, {key:'2027-03', label:'March 2027', short:'Mar', q:2, half:2},
 {key:'2027-04', label:'April 2027', short:'Apr', q:3, half:2}, {key:'2027-05', label:'May 2027', short:'May', q:3, half:2}, {key:'2027-06', label:'June 2027', short:'Jun', q:3, half:2}
];
const QUARTERS=['Q1 Jul-Sep','Q2 Oct-Dec','Q3 Jan-Mar','Q4 Apr-Jun'];

/*
  GOOGLE SHEET ONLINE SYNC SETUP
  Replace the text below with your Google Apps Script Web App URL.
  Example: https://script.google.com/macros/s/AKfycbxxxxxxxxxxxxxxxx/exec
*/
const APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbztdwbm5NFImvclrD-9Gs0_hglcyGVwqZkOaZawi9KQsN9hYIGYvNgkFE14bFSewvPt/exec";const ONLINE_SYNC_ENABLED = APPS_SCRIPT_WEB_APP_URL && !APPS_SCRIPT_WEB_APP_URL.includes('PASTE_YOUR');

function onlineEnabled(){return !!ONLINE_SYNC_ENABLED;}
function setSyncStatus(message, cls='') {
 const el=document.getElementById('syncStatus');
 if(!el) return;
 el.textContent=message;
 el.style.background = cls==='bad' ? '#fff1f1' : cls==='good' ? '#ecfdf3' : '#eef4fb';
 el.style.borderColor = cls==='bad' ? '#f2b8b8' : cls==='good' ? '#b7e4c7' : '#c9d9ec';
}
function scriptUrl(params={}){
 const u=new URL(APPS_SCRIPT_WEB_APP_URL);
 Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
 return u.toString();
}
function jsonp(action, params={}){
 return new Promise((resolve,reject)=>{
   if(!onlineEnabled()) return reject(new Error('Online sync is not configured.'));
   const cb='emea_cb_'+Date.now()+'_'+Math.floor(Math.random()*100000);
   const script=document.createElement('script');
   const timer=setTimeout(()=>{cleanup();reject(new Error('Google Sheet connection timed out.'));},30000);
   function cleanup(){clearTimeout(timer);delete window[cb];if(script.parentNode) script.remove();}
   window[cb]=(payload)=>{cleanup();resolve(payload);};
   script.onerror=()=>{cleanup();reject(new Error('Unable to reach Google Apps Script Web App.'));};
   script.src=scriptUrl({action,callback:cb,...params});
   document.body.appendChild(script);
 });
}
function normalizeRemoteData(remote){
 const clean={updates:{},quotes:[]};
 (remote.weekly||[]).forEach(r=>{
   if(!r.member || !r.tue || !r.monthKey) return;
   if(!clean.updates[r.member]) clean.updates[r.member]={};
   if(!clean.updates[r.member][r.tue]) clean.updates[r.member][r.tue]={};
   clean.updates[r.member][r.tue][r.monthKey]={
     sales:Number(r.sales||0), delivery:Number(r.delivery||0),
     tentativeSales:Number(r.tentativeSales||0), tentativeDelivery:Number(r.tentativeDelivery||0),
     notes:r.notes||''
   };
 });
 clean.quotes=(remote.quotes||[]).map(q=>({
   id:q.id||makeId('q'), member:q.member||'', tue:q.tue||'', customer:q.customer||'', company:q.company||'',
   email:q.email||'', phone:q.phone||'', course:q.course||'', seats:Number(q.seats||0), value:Number(q.value||0),
   expectation:q.expectation||'', close:q.close||''
 }));
 return clean;
}
function loadRemoteData(){
 if(!onlineEnabled()){ setSyncStatus('Local mode: Google Sheet URL is not configured.'); return Promise.resolve(); }
 setSyncStatus('Loading shared data from Google Sheet...');
 return jsonp('data').then(res=>{
   if(!res || !res.ok) throw new Error((res&&res.error)||'Unknown Google Sheet error.');
   state=normalizeRemoteData(res.data||{});
   localStorage.setItem('fy26_27_emea_dashboard', JSON.stringify(state));
   setSyncStatus('Online mode: shared Google Sheet data loaded. Last refresh: '+new Date().toLocaleString(), 'good');
   renderAll();
 }).catch(e=>{
   setSyncStatus('Google Sheet sync issue: '+e.message+' Showing local browser data only.', 'bad');
   renderAll();
 });
}
function writeToSheet(action, record){
 if(!onlineEnabled()) return Promise.resolve({ok:true,localOnly:true});
 setSyncStatus('Saving to Google Sheet...');
 return jsonp(action,{payload:JSON.stringify({record})}).then(res=>{
   if(!res || !res.ok) throw new Error((res&&res.error)||'Save failed.');
   setSyncStatus('Saved to Google Sheet. Refreshing shared data...', 'good');
   return loadRemoteData();
 }).catch(e=>{
   setSyncStatus('Saved locally, but Google Sheet save failed: '+e.message, 'bad');
   throw e;
 });
}
function syncWeeklyEntry(name,tue){
 if(!onlineEnabled()) return Promise.resolve();
 const mem=TEAM.find(x=>x.name===name)||{};
 const promises=threeMonthKeys(tue).map(k=>{
   const u=getUpdate(name,tue,k);
   const mo=MONTHS.find(m=>m.key===k)||{};
   return jsonp('upsertWeekly',{payload:JSON.stringify({record:{
     tue, region:mem.region||'', member:name, monthKey:k, monthLabel:mo.label||k,
     sales:Number(u.sales||0), delivery:Number(u.delivery||0),
     tentativeSales:Number(u.tentativeSales||0), tentativeDelivery:Number(u.tentativeDelivery||0), notes:u.notes||''
   }})});
 });
 setSyncStatus('Saving weekly numbers to Google Sheet...');
 return Promise.all(promises).then(results=>{
   const bad=results.find(r=>!r || !r.ok);
   if(bad) throw new Error(bad.error||'One weekly row failed to save.');
   setSyncStatus('Weekly numbers saved to Google Sheet. Refreshing shared data...', 'good');
   return loadRemoteData();
 });
}

let state = load();
function load(){
 try{
   let raw=localStorage.getItem('fy26_27_emea_dashboard');
   let data=raw?JSON.parse(raw):{};
   if(!data || typeof data!=='object') data={};
   data.updates=data.updates && typeof data.updates==='object'?data.updates:{};
   data.quotes=Array.isArray(data.quotes)?data.quotes:[];
   return data;
 }catch(e){return {updates:{},quotes:[]}}
}
function save(){localStorage.setItem('fy26_27_emea_dashboard', JSON.stringify(state)); renderAll();}
function money(n){return CURRENCY+' '+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0})}
function pct(a,b){return b?((a/b)*100):0}
function fmtPct(a,b){return pct(a,b).toFixed(1)+'%'}
function dateISO(d){return d.toISOString().slice(0,10)}
function qTarget(member, qi){return member.q[qi]||0}
function monthTarget(member, mkey){let m=MONTHS.find(x=>x.key===mkey); return m ? qTarget(member,m.q)/3 : 0}
function halfTarget(member,h){return h===1 ? member.q[0]+member.q[1] : member.q[2]+member.q[3]}
function regionList(){return ['Europe','Middle East','Africa']}
function orderedRegionListWithEmea(){return ['EMEA',...regionList()]}
function regionFilter(region){return region==='EMEA' ? (m=>true) : (m=>m.region===region)}
function activeTuesday(){let today=new Date(); let d=new Date(today); d.setHours(0,0,0,0); if(d<FY_START) return dateISO(new Date(FY_START)); let day=d.getDay(); let diff=(day>=2)?day-2:day+5; d.setDate(d.getDate()-diff); if(d<FY_START) d=new Date(FY_START); return dateISO(d)}

function latestSavedUpdateDate(){
 let dates=[];
 Object.keys(state.updates||{}).forEach(member=>{
   Object.keys(state.updates[member]||{}).forEach(tue=>{
     if(state.updates[member][tue] && Object.keys(state.updates[member][tue]).length) dates.push(tue);
   });
 });
 dates.sort();
 return dates.at(-1)||'';
}
function latestSavedQuotationDate(){
 let dates=(state.quotes||[]).map(q=>q.tue).filter(Boolean).sort();
 return dates.at(-1)||'';
}
function dashboardTuesday(){
 let dates=[activeTuesday(),latestSavedUpdateDate(),latestSavedQuotationDate()].filter(Boolean).sort();
 return dates.at(-1)||activeTuesday();
}
function countUpdatesForDate(tue){
 let c=0;
 Object.keys(state.updates||{}).forEach(member=>{
   if(state.updates[member] && state.updates[member][tue]) c+=Object.keys(state.updates[member][tue]).length;
 });
 return c;
}

function currentMonthKeyFromTuesday(tue){let d=new Date(tue+'T00:00:00'); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function threeMonthKeys(tue=activeTuesday()){let start=currentMonthKeyFromTuesday(tue); let idx=MONTHS.findIndex(m=>m.key===start); if(idx<0) idx=0; return MONTHS.slice(idx,Math.min(idx+3,MONTHS.length)).map(m=>m.key)}
function previousTuesday(tue){let d=new Date(tue+'T00:00:00'); d.setDate(d.getDate()-7); return dateISO(d)}
function getUpdate(name,tue,mkey){return state.updates?.[name]?.[tue]?.[mkey] || {sales:0,delivery:0,tentativeSales:0,tentativeDelivery:0,notes:''}}
function setUpdate(name,tue,mkey,val){state.updates[name]=state.updates[name]||{};state.updates[name][tue]=state.updates[name][tue]||{};state.updates[name][tue][mkey]=val}
function latestTuesdayForMonth(name,mkey,upto=activeTuesday()){let all=Object.keys(state.updates?.[name]||{}).filter(t=>t<=upto && state.updates[name][t][mkey]); all.sort(); return all.at(-1)}
function latestValue(name,mkey,type,upto=activeTuesday()){let t=latestTuesdayForMonth(name,mkey,upto); return t ? Number(getUpdate(name,t,mkey)[type]||0) : 0}
function sumMembers(filterFn,mkeys,type,upto=activeTuesday()){return TEAM.filter(filterFn).reduce((s,mem)=>s+mkeys.reduce((a,m)=>a+latestValue(mem.name,m,type,upto),0),0)}
function targetMembers(filterFn,mkeys){return TEAM.filter(filterFn).reduce((s,mem)=>s+mkeys.reduce((a,m)=>a+monthTarget(mem,m),0),0)}
function annualTarget(filterFn){return TEAM.filter(filterFn).reduce((s,m)=>s+m.yearly,0)}
function quarterKeys(qi){return MONTHS.filter(m=>m.q===qi).map(m=>m.key)}
function halfKeys(h){return MONTHS.filter(m=>m.half===h).map(m=>m.key)}
function ytdKeys(uptoMonthKey){return MONTHS.filter(m=>m.key<=uptoMonthKey).map(m=>m.key)}
function card(label,value,sub='',cls=''){return `<div class="kpi"><div class="label">${label}</div><div class="value ${cls}">${value}</div><div class="sub">${sub}</div></div>`}
function percentBadge(actual,target){let p=pct(actual,target); let cls=p>=100?'ok':p<70?'flag':'pill'; return `<span class="${cls}">${p.toFixed(1)}%</span>`}
function achievementCell(actual,target){let p=pct(actual,target); let cls=p>=100?'goodbar':p<70?'badbar':''; return `<div><b>${money(actual)}</b> ${percentBadge(actual,target)}<div class="note">Target ${money(target)} | Gap ${money(actual-target)}</div><div class="progress"><div class="bar ${cls}" style="width:${Math.min(100,p)}%"></div></div></div>`}
function reductionFlag(curr,prev,label){if(curr<prev)return `<span class="flag">${label} reduced by ${money(prev-curr)}</span>`; if(curr>prev)return `<span class="ok">Increased ${money(curr-prev)}</span>`; return `<span class="pill">No change</span>`}
function targetByPeriod(filterFn, period, key){
 if(period==='month') return targetMembers(filterFn,[key]);
 if(period==='quarter') return targetMembers(filterFn,quarterKeys(key));
 if(period==='half') return targetMembers(filterFn,halfKeys(key));
 if(period==='annual') return annualTarget(filterFn);
 return 0;
}
function actualByPeriod(filterFn, period, key, type='sales', upto=activeTuesday()){
 if(period==='month') return sumMembers(filterFn,[key],type,upto);
 if(period==='quarter') return sumMembers(filterFn,quarterKeys(key),type,upto);
 if(period==='half') return sumMembers(filterFn,halfKeys(key),type,upto);
 if(period==='annual') return sumMembers(filterFn,MONTHS.map(m=>m.key),type,upto);
 return 0;
}
function periodRows(filterFn, upto=activeTuesday()){
 let html='';

function chartHBar(title, desc, rows, valueFormatter=money, capAt100=false){
 let max=Math.max(1,...rows.map(r=>Number(r.value||0)),...rows.map(r=>Number(r.target||0)));
 return `<div class="chart-card"><h3>${title}</h3><div class="desc">${desc}</div>`+rows.map(r=>{
   let val=Number(r.value||0), target=Number(r.target||0), width=capAt100?Math.min(100,val):Math.min(100,(val/max)*100);
   let cls=r.cls||'';
   let sub=r.sub?`<div class="smalltext">${r.sub}</div>`:'';
   return `<div class="chart-row"><div class="chart-label">${r.label}${sub}</div><div class="chart-track"><div class="chart-fill ${cls}" style="width:${width}%"></div></div><div class="chart-value">${valueFormatter(val)}${target?`<br><span class="smalltext">Target ${money(target)}</span>`:''}</div></div>`;
 }).join('')+`</div>`;
}
function chartGrouped(title, desc, labels, series){

 let cols=labels.map((lab,i)=>`<div class="chart-col">${series.map(s=>`<div class="chart-bar ${s.cls||''}" title="${s.label}: ${money(s.values[i]||0)}" style="height:${Math.max(2,((s.values[i]||0)/max)*135)}px"></div>`).join('')}</div>`).join('');
 let axis=labels.map(l=>`<span>${l}</span>`).join('');
 let legend=series.map(s=>`<span><i class="${s.cls||'sales'}"></i>${s.label}</span>`).join('');
 let exact=`<table class="chart-data"><thead><tr><th>Item</th>${series.map(s=>`<th class="num">${s.label}</th>`).join('')}</tr></thead><tbody>${labels.map((lab,i)=>`<tr><td>${lab}</td>${series.map(s=>`<td class="num"><b>${money(s.values[i]||0)}</b></td>`).join('')}</tr>`).join('')}</tbody></table>`;
 return `<div class="chart-card"><h3>${title}</h3><div class="desc">${desc}</div><div class="chart-mini">${cols}</div><div class="chart-axis">${axis}</div><div class="legend">${legend}</div>${exact}</div>`;
}
